# 直接版 workflow — 不依賴 reusable workflow

name: 部署到 Staging (Direct)

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths-ignore:
      - '*.md'
      - 'docs/**'

jobs:
  deploy:
    name: 部署 ${{ github.event.repository.name }}
    runs-on: ubuntu-latest
    concurrency:
      group: staging-deploy-${{ github.event.repository.name }}
      cancel-in-progress: false

    steps:
    - name: 產生 GitHub App Token
      id: app-token
      uses: actions/create-github-app-token@v1
      with:
        app-id: ${{ secrets.GH_APP_ID }}
        private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
        owner: ${{ github.repository_owner }}

    - name: 透過 SSH 部署到 Staging VM
      uses: appleboy/ssh-action@v1
      with:
        host: ${{ secrets.STAGING_HOST }}
        username: deploy
        key: ${{ secrets.STAGING_SSH_KEY }}
        command_timeout: 20m
        envs: GITHUB_TOKEN
        script: /opt/deploy-config/deploy.sh "${{ github.repository_owner }}" "${{ github.event.repository.name }}" "auto"
      env:
        GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
