<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>優惠券管理｜沃茲後台</title>
  <link rel="stylesheet" href="admin.css">

  <!-- Supabase Client -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../supabase-config.js"></script>

  <style>
    .coupon-card {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 12px;
      display: grid;
      grid-template-columns: 100px 1fr 200px 140px 120px;
      gap: 14px;
      align-items: center;
    }
    .coupon-card.disabled { opacity: .55; }
    .coupon-code {
      font-family: 'SF Mono', Menlo, monospace;
      font-weight: 700;
      font-size: 14px;
      background: #1a1f36;
      color: #fff;
      padding: 6px 10px;
      border-radius: 4px;
      text-align: center;
      letter-spacing: 1px;
    }
    .coupon-discount-big {
      font-size: 22px;
      font-weight: 700;
      color: #f97316;
    }
    .coupon-meta { font-size: 12px; color: #6b7280; line-height: 1.6; }
    .coupon-name { font-size: 15px; font-weight: 600; color: #1f2937; margin-bottom: 4px; }
    .status-badge {
      display: inline-block;
      padding: 3px 8px;
      font-size: 11px;
      border-radius: 4px;
      font-weight: 600;
    }
    .status-active   { background:#dcfce7; color:#166534; }
    .status-paused   { background:#fef3c7; color:#92400e; }
    .status-expired  { background:#fee2e2; color:#991b1b; }
    .status-depleted { background:#e5e7eb; color:#374151; }
    .coupon-actions { display: flex; gap: 6px; justify-content: flex-end; }

    /* Modal 表單 */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,.5);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.show { display: flex; }
    .modal-box {
      background: #fff;
      border-radius: 8px;
      max-width: 640px;
      width: 95%;
      max-height: 90vh;
      overflow-y: auto;
      padding: 24px;
    }
    .modal-title {
      font-size: 18px; font-weight: 700; color: #1f2937;
      margin-bottom: 18px; padding-bottom: 12px;
      border-bottom: 1px solid #e5e7eb;
    }
    .form-row { margin-bottom: 14px; }
    .form-row label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 5px;
    }
    .form-row input, .form-row textarea, .form-row select {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #d1d5db;
      border-radius: 4px;
      font-size: 14px;
      box-sizing: border-box;
    }
    .form-row textarea { min-height: 60px; resize: vertical; }
    .form-row .hint { font-size: 11px; color: #9ca3af; margin-top: 3px; }
    .form-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    /* Radio 群組 */
    .radio-group {
      display: flex;
      gap: 14px;
      padding: 6px 0;
    }
    .radio-group label {
      display: flex !important;
      align-items: center;
      gap: 6px;
      margin: 0 !important;
      cursor: pointer;
      font-weight: normal !important;
    }
    .radio-group input { width: auto !important; }

    /* 場館多選 */
    .venue-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding: 8px 0;
    }
    .venue-chip {
      padding: 5px 10px;
      border: 1px solid #d1d5db;
      border-radius: 4px;
      font-size: 13px;
      cursor: pointer;
      user-select: none;
    }
    .venue-chip.selected {
      background: #1a1f36;
      color: #fff;
      border-color: #1a1f36;
    }

    .modal-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      padding-top: 14px;
      border-top: 1px solid #e5e7eb;
      margin-top: 14px;
    }
  </style>
</head>
<body>

  <header class="admin-topbar">
    <div class="admin-topbar-left">
      <a href="index.html" class="admin-brand">沃茲後台</a>
    </div>
    <div class="admin-topbar-right">
      <span style="color:#9ca3af; font-size:13px;">demo 模式（無權限驗證）</span>
    </div>
  </header>

  <div class="admin-layout">
    <aside class="admin-sidebar">
      <nav class="admin-nav">
        <div class="admin-nav-section">
          <div class="admin-nav-title">總覽</div>
          <a href="index.html" class="admin-nav-item"><span class="admin-nav-icon">📊</span><span>Dashboard</span></a>
        </div>
        <div class="admin-nav-section">
          <div class="admin-nav-title">場館設定</div>
          <a href="venues.html" class="admin-nav-item"><span class="admin-nav-icon">🏛️</span><span>場館管理</span></a>
          <a href="plans.html" class="admin-nav-item"><span class="admin-nav-icon">📦</span><span>方案管理</span></a>
          <a href="pricing.html" class="admin-nav-item"><span class="admin-nav-icon">💰</span><span>價格管理</span></a>
        </div>
        <div class="admin-nav-section">
          <div class="admin-nav-title">營運管理</div>
          <a href="orders.html" class="admin-nav-item"><span class="admin-nav-icon">🛍️</span><span>訂單管理</span></a>
          <a href="customers.html" class="admin-nav-item"><span class="admin-nav-icon">👥</span><span>客戶管理</span></a>
          <a href="tiers.html" class="admin-nav-item"><span class="admin-nav-icon">💎</span><span>會員等級</span></a>
          <a href="coupons.html" class="admin-nav-item active"><span class="admin-nav-icon">🎟️</span><span>優惠券</span></a>
        </div>
        <div class="admin-nav-section">
          <div class="admin-nav-title">帳款管理</div>
          <a href="payments.html" class="admin-nav-item"><span class="admin-nav-icon">💸</span><span>匯款比對</span></a>
        </div>
      </nav>
    </aside>

    <main class="admin-main">
      <div class="admin-page-header">
        <h1 class="admin-page-title">🎟️ 優惠券管理</h1>
        <button class="admin-btn admin-btn-primary" onclick="openCouponModal()">＋ 新增優惠券</button>
      </div>

      <div style="background:#fef3c7;border-left:4px solid #f59e0b;padding:12px 16px;border-radius:6px;margin-bottom:16px;font-size:13px;color:#92400e;">
        💡 客戶必須<strong>輸入優惠碼</strong>才能加到自己帳號 →
        到「我的優惠券」→ 結帳時可選用<br>
        🔍 已兌換次數會顯示在每張券上方
      </div>

      <div id="couponsList">
        <div style="padding:40px;text-align:center;color:#9ca3af;">載入中...</div>
      </div>
    </main>
  </div>

  <!-- ===== Modal: 新增 / 編輯 ===== -->
  <div class="modal-overlay" id="couponModal">
    <div class="modal-box">
      <div class="modal-title" id="modalTitle">新增優惠券</div>

      <div class="form-row">
        <label>優惠碼 <span style="color:#dc2626">*</span></label>
        <input type="text" id="f_code" placeholder="例：WELCOME200（自動轉大寫）" style="text-transform:uppercase;">
        <div class="hint">客戶在前台輸入此 code 兌換</div>
      </div>

      <div class="form-row">
        <label>優惠券抬頭 <span style="color:#dc2626">*</span></label>
        <input type="text" id="f_name" placeholder="例：新會員迎賓 NT$200">
      </div>

      <div class="form-row">
        <label>描述</label>
        <textarea id="f_description" placeholder="例：歡迎新會員！首次預訂滿 NT$1,500 即可使用"></textarea>
      </div>

      <div class="form-row">
        <label>折扣類型 <span style="color:#dc2626">*</span></label>
        <div class="radio-group">
          <label><input type="radio" name="discount_type" value="amount" checked onchange="toggleDiscountType()"> 固定金額折抵</label>
          <label><input type="radio" name="discount_type" value="percent" onchange="toggleDiscountType()"> 百分比折扣</label>
        </div>
      </div>

      <div class="form-grid-2">
        <div class="form-row">
          <label>折扣值 <span style="color:#dc2626">*</span></label>
          <input type="number" id="f_discount_value" placeholder="200">
          <div class="hint" id="discountHint">金額折抵：填 200 表示折 NT$200</div>
        </div>
        <div class="form-row" id="maxDiscountWrap" style="display:none;">
          <label>折扣上限</label>
          <input type="number" id="f_max_discount" placeholder="例：1000">
          <div class="hint">折扣最多 NT$ 多少（限百分比折扣）</div>
        </div>
        <div class="form-row">
          <label>最低消費</label>
          <input type="number" id="f_min_order" placeholder="例：1500">
          <div class="hint">訂單金額需滿多少才能使用</div>
        </div>
        <div class="form-row">
          <label>總數量</label>
          <input type="number" id="f_total_quantity" placeholder="例：100，留空 = 無限">
        </div>
      </div>

      <div class="form-grid-2">
        <div class="form-row">
          <label>使用期限｜開始</label>
          <input type="date" id="f_valid_from">
        </div>
        <div class="form-row">
          <label>使用期限｜結束</label>
          <input type="date" id="f_valid_until">
        </div>
      </div>

      <div class="form-row">
        <label>適用場館</label>
        <div class="venue-chips" id="venueChips">
          <!-- JS 動態填 -->
        </div>
        <div class="hint">不選任何 = 適用全場館；多選 = 只能用於這些場館</div>
      </div>

      <div class="form-row">
        <label>狀態</label>
        <select id="f_status">
          <option value="active">啟用中</option>
          <option value="paused">暫停</option>
          <option value="expired">已過期</option>
        </select>
      </div>

      <div class="modal-actions">
        <button class="admin-btn" onclick="closeCouponModal()">取消</button>
        <button class="admin-btn admin-btn-primary" onclick="saveCoupon()" id="saveBtn">儲存</button>
      </div>
    </div>
  </div>

  <script>
    let COUPONS = [];
    let VENUES = [];
    let editingCouponId = null;
    let selectedVenueIds = [];

    async function loadVenues() {
      const { data } = await supabaseClient.from('venues').select('id, name').order('code');
      VENUES = data || [];
    }

    async function loadCoupons() {
      const { data, error } = await supabaseClient
        .from('coupons')
        .select('*')
        .order('created_at', { ascending: false });

      if (error) {
        document.getElementById('couponsList').innerHTML =
          `<div style="padding:40px;text-align:center;color:#dc2626">讀取失敗：${error.message}</div>`;
        return;
      }
      COUPONS = data || [];
      renderCoupons();
    }

    function renderCoupons() {
      const list = document.getElementById('couponsList');
      if (COUPONS.length === 0) {
        list.innerHTML = `
          <div style="padding:60px;text-align:center;color:#9ca3af;background:#fff;border-radius:8px;">
            <div style="font-size:64px;margin-bottom:12px;opacity:.4;">🎟️</div>
            <p>還沒有優惠券，點上方「+ 新增優惠券」開始</p>
          </div>`;
        return;
      }

      list.innerHTML = COUPONS.map(c => {
        const discountText = c.discount_type === 'amount'
          ? `$${Number(c.discount_value).toLocaleString()}`
          : `${Math.round(c.discount_value * 100) % 100 === 0 ? Math.round(c.discount_value * 10) : c.discount_value * 10} 折`;
        const venueText = (!c.applicable_venue_ids || c.applicable_venue_ids.length === 0)
          ? '全場館' : `${c.applicable_venue_ids.length} 個指定場館`;
        const validRange = (c.valid_from || c.valid_until)
          ? `${(c.valid_from || '').slice(0,10)} ~ ${(c.valid_until || '').slice(0,10) || '長期'}`
          : '長期有效';

        const statusLabel = { active: '啟用中', paused: '暫停', expired: '已過期', depleted: '已用完' }[c.status] || c.status;

        return `
          <div class="coupon-card ${c.status !== 'active' ? 'disabled' : ''}">
            <div class="coupon-code">${c.code}</div>
            <div>
              <div class="coupon-name">${escapeHtml(c.name)}</div>
              <div class="coupon-meta">${escapeHtml(c.description || '—')}</div>
              <div class="coupon-meta" style="margin-top:4px;">
                📅 ${validRange}<br>
                🏛️ ${venueText} · 最低消費 NT$${Number(c.min_order_amount || 0).toLocaleString()}
              </div>
            </div>
            <div>
              <div class="coupon-discount-big">${discountText}</div>
              <div class="coupon-meta">${c.discount_type === 'amount' ? '金額折抵' : '百分比折扣'}</div>
            </div>
            <div>
              <div class="coupon-meta">已兌換 <strong>${c.used_count || 0}</strong> 次</div>
              <div class="coupon-meta">總量 ${c.total_quantity ? Number(c.total_quantity).toLocaleString() + ' 張' : '無限'}</div>
              <div style="margin-top:6px;"><span class="status-badge status-${c.status}">${statusLabel}</span></div>
            </div>
            <div class="coupon-actions">
              <button class="admin-btn admin-btn-sm" onclick="editCoupon('${c.id}')">編輯</button>
              <button class="admin-btn admin-btn-danger admin-btn-sm" onclick="deleteCoupon('${c.id}')">刪除</button>
            </div>
          </div>
        `;
      }).join('');
    }

    function escapeHtml(s) {
      return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // ============ Modal: 新增 / 編輯 ============
    function openCouponModal(coupon) {
      editingCouponId = coupon ? coupon.id : null;
      document.getElementById('modalTitle').textContent = coupon ? '編輯優惠券' : '新增優惠券';

      document.getElementById('f_code').value = coupon?.code || '';
      document.getElementById('f_name').value = coupon?.name || '';
      document.getElementById('f_description').value = coupon?.description || '';

      // discount_type radio
      const discType = coupon?.discount_type || 'amount';
      document.querySelector(`input[name="discount_type"][value="${discType}"]`).checked = true;

      // discount_value 顯示
      let dispValue = coupon?.discount_value || '';
      if (discType === 'percent' && dispValue) dispValue = Math.round(dispValue * 100);  // 0.85 → 85
      document.getElementById('f_discount_value').value = dispValue;

      document.getElementById('f_max_discount').value = coupon?.max_discount_amount || '';
      document.getElementById('f_min_order').value = coupon?.min_order_amount || '';
      document.getElementById('f_total_quantity').value = coupon?.total_quantity || '';
      document.getElementById('f_valid_from').value = coupon?.valid_from ? coupon.valid_from.slice(0,10) : '';
      document.getElementById('f_valid_until').value = coupon?.valid_until ? coupon.valid_until.slice(0,10) : '';
      document.getElementById('f_status').value = coupon?.status || 'active';

      selectedVenueIds = coupon?.applicable_venue_ids ? [...coupon.applicable_venue_ids] : [];
      renderVenueChips();
      toggleDiscountType();

      document.getElementById('couponModal').classList.add('show');
    }

    function editCoupon(id) {
      const c = COUPONS.find(c => c.id === id);
      if (c) openCouponModal(c);
    }

    function closeCouponModal() {
      document.getElementById('couponModal').classList.remove('show');
    }

    function renderVenueChips() {
      const wrap = document.getElementById('venueChips');
      wrap.innerHTML = VENUES.map(v => `
        <div class="venue-chip ${selectedVenueIds.includes(v.id) ? 'selected' : ''}"
             onclick="toggleVenue('${v.id}')">${v.name}</div>
      `).join('');
    }

    function toggleVenue(id) {
      const idx = selectedVenueIds.indexOf(id);
      if (idx >= 0) selectedVenueIds.splice(idx, 1);
      else selectedVenueIds.push(id);
      renderVenueChips();
    }

    function toggleDiscountType() {
      const type = document.querySelector('input[name="discount_type"]:checked').value;
      const maxWrap = document.getElementById('maxDiscountWrap');
      const hint = document.getElementById('discountHint');
      const valInput = document.getElementById('f_discount_value');
      if (type === 'percent') {
        maxWrap.style.display = '';
        hint.textContent = '百分比折扣：填 85 表示 85 折（不是 0.85）';
        valInput.setAttribute('max', '99');
      } else {
        maxWrap.style.display = 'none';
        hint.textContent = '金額折抵：填 200 表示折 NT$200';
        valInput.removeAttribute('max');
      }
    }

    async function saveCoupon() {
      const code = document.getElementById('f_code').value.trim().toUpperCase();
      const name = document.getElementById('f_name').value.trim();
      const description = document.getElementById('f_description').value.trim();
      const discType = document.querySelector('input[name="discount_type"]:checked').value;
      let discValue = parseFloat(document.getElementById('f_discount_value').value);
      const maxDiscount = parseFloat(document.getElementById('f_max_discount').value) || null;
      const minOrder = parseFloat(document.getElementById('f_min_order').value) || null;
      const totalQty = parseInt(document.getElementById('f_total_quantity').value) || null;
      const validFrom = document.getElementById('f_valid_from').value || null;
      const validUntil = document.getElementById('f_valid_until').value || null;
      const status = document.getElementById('f_status').value;

      if (!code) { alert('請輸入優惠碼'); return; }
      if (!name) { alert('請輸入優惠券抬頭'); return; }
      if (!discValue || discValue <= 0) { alert('請輸入折扣值'); return; }
      if (discType === 'percent') {
        if (discValue >= 100) { alert('百分比折扣應小於 100'); return; }
        discValue = discValue / 100;  // 85 → 0.85
      }

      const data = {
        code,
        name,
        description: description || null,
        discount_type: discType,
        discount_value: discValue,
        max_discount_amount: discType === 'percent' ? maxDiscount : null,
        min_order_amount: minOrder,
        total_quantity: totalQty,
        valid_from: validFrom,
        valid_until: validUntil ? validUntil + 'T23:59:59' : null,
        applicable_venue_ids: selectedVenueIds.length > 0 ? selectedVenueIds : null,
        status,
      };

      const btn = document.getElementById('saveBtn');
      btn.disabled = true; btn.textContent = '儲存中...';

      let error;
      if (editingCouponId) {
        ({ error } = await supabaseClient.from('coupons').update(data).eq('id', editingCouponId));
      } else {
        ({ error } = await supabaseClient.from('coupons').insert(data));
      }
      btn.disabled = false; btn.textContent = '儲存';
      if (error) { alert('儲存失敗：' + error.message); return; }

      closeCouponModal();
      await loadCoupons();
      toast(editingCouponId ? '已更新優惠券' : '已新增優惠券「' + code + '」');
    }

    async function deleteCoupon(id) {
      const c = COUPONS.find(c => c.id === id);
      if (!confirm(`確定要刪除「${c.name}」(${c.code})？\n注意：已兌換此券的客戶會無法使用。`)) return;
      const { error } = await supabaseClient.from('coupons').delete().eq('id', id);
      if (error) { alert('刪除失敗：' + error.message); return; }
      await loadCoupons();
      toast('已刪除');
    }

    function toast(msg) {
      const t = document.createElement('div');
      t.style.cssText = 'position:fixed;top:20px;right:20px;background:#16a34a;color:#fff;padding:12px 20px;border-radius:6px;font-size:14px;z-index:9999;box-shadow:0 4px 12px rgba(0,0,0,.15);';
      t.textContent = '✅ ' + msg;
      document.body.appendChild(t);
      setTimeout(() => t.remove(), 2500);
    }

    // 啟動
    (async () => {
      await loadVenues();
      await loadCoupons();
    })();
  </script>

</body>
</html>
