<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>後台登入｜沃茲新創空間</title>
  <link rel="stylesheet" href="admin.css">
</head>
<body class="admin-login-body">

  <div class="admin-login-card">
    <div class="admin-login-logo">
      <img src="../images/LOGO.png" alt="沃茲新創空間 WORDS LIVE" class="admin-login-logo-img">
      <p>後台管理系統</p>
    </div>

    <div class="admin-login-error" id="errorMsg">
      帳號或密碼錯誤，請重新輸入
    </div>

    <form class="admin-login-form" id="loginForm">
      <div class="form-group">
        <label for="username">帳號</label>
        <input type="text" id="username" name="username" autocomplete="username" required>
      </div>

      <div class="form-group">
        <label for="password">密碼</label>
        <input type="password" id="password" name="password" autocomplete="current-password" required>
      </div>

      <button type="submit" class="admin-login-btn">登入後台</button>
    </form>

    <p class="admin-login-hint">
      Demo 帳號：admin　/　密碼：admin123
    </p>
  </div>

  <script>
    // 如果已經登入，直接跳轉到 dashboard
    if (localStorage.getItem('admin_logged_in') === 'true') {
      window.location.href = 'index.html';
    }

    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const errorMsg = document.getElementById('errorMsg');

      // Demo 用：寫死帳密
      if (username === 'admin' && password === 'admin123') {
        localStorage.setItem('admin_logged_in', 'true');
        localStorage.setItem('admin_username', username);
        window.location.href = 'index.html';
      } else {
        errorMsg.classList.add('show');
        document.getElementById('password').value = '';
      }
    });
  </script>

</body>
</html>
